front:
  text: 淨土十疑論序宋無為子楊傑述愛不重不生娑婆念不一不生極樂娑婆穢土也極樂淨土也娑婆之壽有量彼土之壽則無量矣娑婆備諸苦彼土則安養無苦矣娑婆隨業轉輪生死彼土一往則永證無生法忍若願度生則任意自在不為諸業轉矣其淨穢壽量苦樂生死如是差別而眾生冥然不知可不哀哉阿彌陀佛淨土攝受之主也釋迦如來指導淨土之師也觀音勢至助佛揚化者也是以如來一代教典處處叮嚀勸往生也阿彌陀佛與觀音勢至乘大願船泛生死海不著此岸不留彼岸不止中流唯以濟度為佛事是故阿彌陀經云若有善男子善女人聞說阿彌陀佛執持名號若一日乃至七日一心不亂其人臨命終時阿彌陀佛與諸聖眾現在其前是人終時心不顛倒即得往生極樂國土又經云十方眾生聞我名號憶念我國植諸德本至心迴向欲生我國不果遂者不取正覺所以祇洹精舍無常院令病者面西作往生淨土想蓋彌陀光明遍照法界念佛眾生攝取不捨聖凡一體機感相應諸佛心內眾生塵塵極樂眾生心中淨土念念彌陀吾以是觀之智慧者易生能斷疑故禪定者易生不散亂故持戒者易生遠諸染故布施者易生不我有故忍辱者易生不瞋恚故精進者易生不退轉故不造善不作惡者易生念能一故諸惡已作業報已現者易生實慚懼故雖有眾善若無誠信心無深心無迴向發願心者則不得上上品生矣噫彌陀甚易持淨土甚易往眾生不能持不能往佛如眾生何夫造惡業入苦趣念彌陀生極樂二者皆佛言也世人憂墮地獄而疑往生者不亦惑哉晉慧遠法師與當時高士劉遺民等結白蓮社於廬山蓋致精誠於此爾其後七百年僧俗修持獲感應者非一咸見于淨土傳記豈誣也哉然贊輔彌陀教觀者其書山積唯天台智者大師淨土十疑論最為首冠援引聖言開決群惑萬年闇室日至而頓有餘光千里水程舟具而不勞自力非法藏後身不能至於是也傑頃於都下甞獲斯文讀示所知無不生信自遭酷罰感寤益深將廣其傳因為序引熙寧九年仲秋述
